    <script>
        document.getElementById('tokenInput').value = localStorage.getItem('hf_token') || '';

        function updateCount() {
            const len = document.getElementById('textInput').value.length;
            document.getElementById('charCount').innerText = len;
        }

        let audioUrl = null;

        async function generateSpeech() {
            const token = document.getElementById('tokenInput').value.trim();
            const text = document.getElementById('textInput').value.trim();
            const btn = document.getElementById('submitBtn');
            const statusContainer = document.getElementById('statusContainer');
            const statusText = document.getElementById('statusText');
            const resultContainer = document.getElementById('resultContainer');
            const player = document.getElementById('audioPlayback');

            if (!token) return alert("Please paste your Hugging Face Access Token first.");
            if (!text) return alert("Please type your text script first.");

            localStorage.setItem('hf_token', token);

            btn.disabled = true;
            resultContainer.style.display = 'none';
            statusContainer.style.display = 'block';
            statusText.innerText = "Transmitting tokens to Bark AI cluster nodes...";

            try {
                // Connecting to the premium browser-compatible Bark model matrix
                const response = await fetch("https://huggingface.co", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ inputs: text })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    if (errData.error && errData.error.includes("loading")) {
                        statusText.innerText = "Waking up cloud server clusters... please wait 20 seconds.";
                        setTimeout(generateSpeech, 20000);
                        return;
                    }
                    throw new Error(errData.error || `Server error code: ${response.status}`);
                }

                const blob = await response.blob();
                if (audioUrl) URL.revokeObjectURL(audioUrl);
                
                audioUrl = URL.createObjectURL(blob);
                player.src = audioUrl;
                statusContainer.style.display = 'none';
                resultContainer.style.display = 'block';
                player.play();
            } catch (err) {
                statusContainer.style.display = 'none';
                alert("AI Pipeline Error: " + err.message);
                console.error(err);
            } finally {
                btn.disabled = false;
            }
        }

        function downloadAudio() {
            if (!audioUrl) return;
            const a = document.createElement('a');
            a.href = audioUrl;
            a.download = `voicelab-ai-${Date.now()}.flac`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
